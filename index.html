    <!-- Icons -->
    <link rel="icon" type="image/png" sizes="192x192" href="/ExpensesApp/icon-192-v11.png" />
    <link rel="apple-touch-icon" href="/ExpensesApp/apple-touch-icon.png" />
    <link rel="manifest" href="/ExpensesApp/manifest-v11.json" />

    <!-- Open Graph (para WhatsApp, Facebook, etc.) -->

    <meta property="og:description" content="App para gestionar gastos compartidos entre amigos" />
    <meta property="og:image" content="https://dpdb13.github.io/ExpensesApp/logo.png?v=11" />

    <!-- Fuentes distintivas de Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=Fraunces:opsz,wght@9..144,600;9..144,700&display=swap" rel="stylesheet">
    <script type="module" crossorigin src="/ExpensesApp/assets/index-ENKFInoA.js"></script>
    <link rel="stylesheet" crossorigin href="/ExpensesApp/assets/index-PXwEiZNV.css">
  </head>
  <body>
    <div id="root"></div>

    <!-- Service Worker con auto-actualización -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/ExpensesApp/sw.js', { scope: '/ExpensesApp/' })
            .then((registration) => {
              console.log('SW registrado');
              if (registration.waiting) {
                registration.waiting.postMessage({ type: 'SKIP_WAITING' });
              }
              registration.addEventListener('updatefound', () => {
                const newWorker = registration.installing;
                newWorker.addEventListener('statechange', () => {
                  if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                    newWorker.postMessage({ type: 'SKIP_WAITING' });
                  }
                });
              });
            })
            .catch((error) => {
              console.log('SW error:', error);
            });
        });
        navigator.serviceWorker.addEventListener('controllerchange', () => {
          window.location.reload();
        });
      }
    </script>
  </body>
</html>
